<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProLATAM - Profesionales Verificados LATAM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcjNhyQkP5hYHUx7FPIoFFflnhCb-3Iuc",
      authDomain: "prolatam.firebaseapp.com",
      projectId: "prolatam",
      storageBucket: "prolatam.firebasestorage.app",
      messagingSenderId: "109756915226",
      appId: "1:109756915226:web:f0cb69a5d930f46fb5fba3"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    window.loginGoogle = async () => {
      try { await signInWithPopup(auth, provider); } 
      catch (e) { alert("Error: " + e.message); }
    };
    
    window.logout = () => signOut(auth);
    
    window.crearPerfil = async () => {
      const nombre = document.getElementById('nombre').value;
      const oficio = document.getElementById('oficio').value;
      const ciudad = document.getElementById('ciudad').value;
      const whatsapp = document.getElementById('whatsapp').value;
      if (!auth.currentUser) return alert("Inicia sesión primero");
      if (!nombre || !oficio) return alert("Completa nombre y oficio");
      
      await addDoc(collection(db, "profesionales"), {
        uid: auth.currentUser.uid, nombre, oficio, ciudad, whatsapp,
        email: auth.currentUser.email, foto: auth.currentUser.photoURL,
        plan: "gratis", reseñas: 5, creado: new Date()
      });
      alert("Perfil guardado ✅ Ya apareces en ProLATAM");
      document.getElementById('nombre').value = '';
      document.getElementById('oficio').value = '';
      document.getElementById('ciudad').value = '';
      document.getElementById('whatsapp').value = '';
    };

    function cargarProfesionales() {
      onSnapshot(collection(db, "profesionales"), (snap) => {
        const lista = document.getElementById('lista-profesionales');
        lista.innerHTML = "";
        if (snap.empty) {
          lista.innerHTML = '<p class="text-center text-gray-500 py-8">Sé el primer profesional en registrarte 🔥</p>';
          return;
        }
        snap.forEach((doc) => {
          const p = doc.data();
          lista.innerHTML += `
            <div class="bg-white p-4 rounded-lg shadow mb-4">
              <div class="flex items-center gap-3">
                <img src="${p.foto}" class="w-12 h-12 rounded-full">
                <div>
                  <h3 class="font-bold">${p.nombre} ${p.plan === 'pro' ? '⭐' : ''}</h3>
                  <p class="text-sm text-gray-600">${p.oficio} - ${p.ciudad}</p>
                  <p class="text-yellow-500">★★★★★ ${p.reseñas}</p>
                </div>
              </div>
              <a href="https://wa.me/51${p.whatsapp}" target="_blank" class="mt-3 block bg-green-500 text-white text-center py-2 rounded font-bold">Contactar por WhatsApp</a>
            </div>`;
        });
      });
    }

    onAuthStateChanged(auth, (user) => {
      document.getElementById('btnLogin').style.display = user ? 'none' : 'block';
      document.getElementById('btnLogout').style.display = user ? 'block' : 'none';
      document.getElementById('form-perfil').style.display = user ? 'block' : 'none';
      document.getElementById('user-name').textContent = user ? user.displayName : '';
    });

    window.pagarYape = () => {
      window.open('https://api.whatsapp.com/send?phone=51985191165&text=Hola%20Royer,%20quiero%20activar%20Plan%20Pro%20ProLATAM%20S/29.99', '_blank');
    }

    cargarProfesionales();
  </script>
</head>
<body class="bg-gray-100">
  <header class="bg-blue-600 text-white p-4 sticky top-0">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">ProLATAM</h1>
      <div class="flex items-center gap-2">
        <span id="user-name" class="text-sm"></span>
        <button id="btnLogin" onclick="loginGoogle()" class="bg-white text-blue-600 px-4 py-2 rounded font-bold">Entrar con Google</button>
        <button id="btnLogout" onclick="logout()" class="bg-red-500 px-4 py-2 rounded font-bold" style="display:none">Salir</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-4">
    <div class="bg-yellow-400 text-black p-4 rounded-lg mb-6 text-center">
      <h2 class="text-xl font-bold">🔥 Plan Pro: S/29.99/mes</h2>
      <p class="mb-3">Aparece primero + ⭐ Verificado + WhatsApp directo</p>
      <button onclick="pagarYape()" class="bg-purple-700 text-white px-6 py-3 rounded-lg font-bold">Pagar con Yape: 985191165</button>
    </div>

    <div id="form-perfil" class="bg-white p-6 rounded-lg shadow mb-6" style="display:none">
      <h3 class="text-xl font-bold mb-4">Crea tu perfil gratis</h3>
      <input id="nombre" placeholder="Nombre completo" class="w-full p-2 border rounded mb-3">
      <input id="oficio" placeholder="Oficio: Gasfitero, Electricista..." class="w-full p-2 border rounded mb-3">
      <input id="ciudad" placeholder="Ciudad: Lima, Bogotá, CDMX..." class="w-full p-2 border rounded mb-3">
      <input id="whatsapp" placeholder="WhatsApp: 987654321" class="w-full p-2 border rounded mb-3">
      <button onclick="crearPerfil()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Guardar en Firestore</button>
    </div>

    <h2 class="text-2xl font-bold mb-4">Profesionales Verificados LATAM</h2>
    <div id="lista-profesionales"></div>
  </main>
</body>
</html>
